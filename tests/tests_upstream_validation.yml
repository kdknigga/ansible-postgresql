---
- name: Test upstream package validation guards
  hosts: all
  tasks:
    - name: Skip test on non-RHEL platforms
      meta: end_host
      when: ansible_facts['os_family'] != 'RedHat'

    - name: Test upstream validation - version below minimum
      block:
        - name: Run postgresql role with upstream version 13
          include_tasks: tasks/run_role_with_clear_facts.yml
          vars:
            __sr_public: true
            postgresql_use_upstream_packages: true
            postgresql_version: "13"

        - name: Fail if role did not reject version below 16
          fail:
            msg: >-
              Expected failure for version below 16 but role succeeded

      rescue:
        - name: Test - version minimum error mentions 16 or higher
          assert:
            that:
              - "'16 or higher' in ansible_failed_result.msg"

      always:
        - name: Clean up after version minimum test
          include_tasks: tasks/clean_instance.yml
          tags: tests::cleanup

    - name: Test upstream validation - happy path install
      block:
        - name: Run postgresql role with upstream version 16
          include_tasks: tasks/run_role_with_clear_facts.yml
          vars:
            __sr_public: true
            postgresql_use_upstream_packages: true
            postgresql_version: "16"
            postgresql_password: "testpassword123"

        - name: Flush handlers
          meta: flush_handlers

        - name: Test - postgresql-16 service is active
          service_facts:
          when: __postgresql_is_booted | bool

        - name: Test - verify postgresql-16 service state
          assert:
            that:
              - >-
                ansible_facts.services['postgresql-16.service'].state
                == 'running'
          when: __postgresql_is_booted | bool

        - name: Gather package facts for verification
          package_facts:

        - name: Test - PGDG postgresql16-server package is installed
          assert:
            that:
              - "'postgresql16-server' in ansible_facts.packages"

      rescue:
        - name: Expected to fail in non-booted systems, check error
          assert:
            that: >-
              "postgresql_password option is only supported on
              booted hosts" in ansible_failed_result.msg
          when: not __postgresql_is_booted | bool

        - name: Role must succeed on booted systems
          fail:
            msg: >-
              Unexpected failure on booted system:
              {{ ansible_failed_result.msg }}
          when: __postgresql_is_booted | bool

      always:
        - name: Clean up after happy path test
          include_tasks: tasks/clean_instance.yml
          tags: tests::cleanup

    # OSTree guard test: only runs on OSTree/bootc systems.
    # On non-OSTree systems this block is skipped cleanly.
    - name: Test upstream validation - OSTree guard
      when: __postgresql_is_ostree | d(false) | bool
      block:
        - name: Run postgresql role with upstream on OSTree
          include_tasks: tasks/run_role_with_clear_facts.yml
          vars:
            __sr_public: true
            postgresql_use_upstream_packages: true
            postgresql_version: "16"

        - name: Fail if role did not reject OSTree upstream
          fail:
            msg: >-
              Expected failure for OSTree upstream but role succeeded

      rescue:
        - name: Test - OSTree error message is correct
          assert:
            that:
              - "'not supported on OSTree' in ansible_failed_result.msg"

      always:
        - name: Clean up after OSTree guard test
          include_tasks: tasks/clean_instance.yml
          tags: tests::cleanup

    # Note: The RHEL conflict test (SAFE-02) requires pre-installing
    # RHEL postgresql packages alongside PGDG, which is difficult to
    # set up in a clean CI environment. The guard is verified by code
    # review and by the fact that all existing tests pass with RHEL
    # packages (they do not trigger the guard because
    # postgresql_use_upstream_packages defaults to false). The version
    # minimum test proves the collect-then-fail mechanism works.

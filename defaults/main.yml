---
# Here is the right place to put the role's input variables.
# This file also serves as a documentation for such a variables.

# Examples of role input variables:
postgresql_version: "{{ '16' if ansible_facts['os_family'] == 'RedHat'
  and ansible_facts['distribution'] != 'Fedora'
  and ansible_facts['distribution_major_version'] == '10'
  else '13' }}"
postgresql_password: null
postgresql_cert_name: null
# the container build environment's RAM is independent from the deployment
# (regardless if it's a bootc or system container one), so disable tuning there
# by default
postgresql_server_tuning: "{{ false if (ansible_connection | d('')) == 'buildah' else true }}"
postgresql_ssl_enable: false

# If you want to generate the certificas in the postgresql role
# specify the configuration like this example
# postgresql_certificates:
#   - name: postgresql_cert
#     dns: ['localhost', 'www.example.com']
#     ca: self-sign
postgresql_certificates: []

postgresql_use_upstream_packages: false

# List of PostgreSQL extensions to install via PGDG packages.
# Requires postgresql_use_upstream_packages: true.
# Each item is a dict with:
#   name:           (required) Extension name.
#                   PGDG-packaged: postgis, pgvector, timescaledb, pg_cron, pgaudit.
#                   Contrib-bundled (no separate package install):
#                     pg_stat_statements, auto_explain.
#   state:          (optional) 'present' (default) or 'absent'.
#   version:        (optional) Package version prefix; e.g. version '33' -> postgis33_16.
#                   Selects which release stream to install. Primarily used for PostGIS.
#   shared_preload: (optional) Boolean override for whether this extension is added
#                   to shared_preload_libraries. By default the role manages this
#                   automatically for extensions that require preloading (timescaledb,
#                   pg_stat_statements, pg_cron, pgaudit, auto_explain).
# Example:
# postgresql_extensions:
#   - name: postgis
#   - name: pgvector
#     state: present
#   - name: timescaledb
#   - name: postgis
#     version: '33'
#   - name: pg_stat_statements
postgresql_extensions: []

---
# PGDG upstream package overrides for RHEL 8

__postgresql_packages: >-
  {{ ['postgresql' + postgresql_version + '-server',
      'postgresql' + postgresql_version + '-contrib'] }}

__postgresql_data_dir: "/var/lib/pgsql/{{ postgresql_version }}/data"

__postgresql_service_name: "postgresql-{{ postgresql_version }}"

__postgresql_bin_dir: "/usr/pgsql-{{ postgresql_version }}/bin"

__postgresql_setup_cmd_path: >-
  /usr/pgsql-{{ postgresql_version }}/bin/postgresql-{{ postgresql_version }}-setup

__postgresql_versions_el8: ["16", "17", "18"]

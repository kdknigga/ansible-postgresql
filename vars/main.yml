---
# Put the role's internal variables here that are not distribution specific.
# You can override these by defining the same variable with a different
# value in a platform/version specific file in vars/

# Examples of non-distribution specific (generic) internal variables:
__postgresql_packages: [postgresql-server]
__postgresql_versions_el8: ["10", "12", "13", "15", "16"]
__postgresql_versions_el9: ["13", "15", "16", "18"]
__postgresql_versions_el10: ["16", "18"]

__postgresql_data_dir: /var/lib/pgsql/data
__postgresql_has_setup_cmd: true
__postgresql_service_name: postgresql
__postgresql_bin_dir: /usr/bin
__postgresql_setup_cmd_path: /usr/bin/postgresql-setup
__postgresql_cert_directory: /etc/pki/tls
__postgresql_auth_method: md5

__postgresql_main_conf_file: "{{ __postgresql_data_dir }}/postgresql.conf"
__postgresql_hba_conf_file: "{{ __postgresql_data_dir }}/pg_hba.conf"
__postgresql_conf_file: /etc/postgresql/system-roles.conf
__postgresql_internal_conf_file: /etc/postgresql/system-roles-internal.conf

# ansible_facts required by the role
__postgresql_required_facts:
  - distribution
  - distribution_major_version
  - distribution_version
  - os_family
  - memory_mb

# these facts cannot be used as a gather_subset
__postgresql_no_subset_facts: [memory_mb]

# the subsets of ansible_facts that need to be gathered in case any of the
# facts in required_facts is missing; see the documentation of
# the 'gather_subset' parameter of the 'setup' module
__postgresql_required_facts_subsets: "{{ ['!all', '!min', 'hardware'] +
  __postgresql_required_facts | difference(__postgresql_no_subset_facts) }}"

# Extension name to PGDG base package name prefix.
# Resolution formula:
#   - For most extensions: full_pkg = base ~ '_' ~ postgresql_version
#     (e.g. postgis34 -> postgis34_16, pgvector -> pgvector_16)
#   - For timescaledb: base ends with '-'; full_pkg = base ~ postgresql_version
#     (e.g. timescaledb-2-postgresql- -> timescaledb-2-postgresql-16)
# When user sets item.version, base is built as item.name ~ item.version
# (e.g. name=postgis, version='33' -> base=postgis33 -> postgis33_16)
__postgresql_extension_packages:
  postgis: postgis34
  pgvector: pgvector
  timescaledb: "timescaledb-2-postgresql-"
  pg_cron: pg_cron
  pgaudit: pgaudit

# Contrib-bundled extensions: these ship inside the postgresql{ver}-contrib
# package (already installed by the upstream lifecycle) and have no
# standalone PGDG package. The role accepts them as valid extension names
# but skips the package install step (PKG-03). Preload behavior for these
# is owned by Phase 6 (PRELOAD-01).
__postgresql_contrib_only_extensions:
  - pg_stat_statements
  - auto_explain

# Extensions that require a shared_preload_libraries entry to function.
# auto_explain is included here even though it is contrib-bundled and
# outside the PRELOAD-01 spec - omitting it would leave the variable
# incomplete since auto_explain also requires preloading to activate (D-02).
__postgresql_preload_required:
  - timescaledb
  - pg_stat_statements
  - pg_cron
  - pgaudit
  - auto_explain

# BEGIN - DO NOT EDIT THIS BLOCK - rh distros variables
# Ansible distribution identifiers that the role treats like RHEL
__postgresql_rh_distros:
  - AlmaLinux
  - CentOS
  - RedHat
  - Rocky

# Same as above but includes Fedora
__postgresql_rh_distros_fedora: "{{ __postgresql_rh_distros + ['Fedora'] }}"

# Use this in conditionals to check if distro is Red Hat or clone
__postgresql_is_rh_distro: "{{ ansible_facts['distribution'] in __postgresql_rh_distros }}"

# Use this in conditionals to check if distro is Red Hat or clone, or Fedora
__postgresql_is_rh_distro_fedora: "{{ ansible_facts['distribution'] in __postgresql_rh_distros_fedora }}"
# END - DO NOT EDIT THIS BLOCK - rh distros variables
